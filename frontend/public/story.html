<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    position: relative;
    background: #0f1628;
    image-rendering: pixelated;
  }

  /* Scanline / grid overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.012) 3px,
        rgba(255,255,255,0.012) 4px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.008) 3px,
        rgba(255,255,255,0.008) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Top bar */
  .topbar {
    text-align: center;
    padding: 40px 0 32px;
    position: relative;
    z-index: 1;
  }
  .topbar-logo {
    font-family: 'Inter', sans-serif;
    font-size: 52px;
    color: #ffffff;
    font-weight: 900;
    letter-spacing: -2px;
  }
  .topbar-line {
    height: 6px;
    background: #00c8ff;
    margin-top: 28px;
    box-shadow: 0 0 20px rgba(0,200,255,0.4);
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 1;
    padding: 100px 100px 80px;
    display: flex;
    flex-direction: column;
    height: calc(100% - 140px);
  }

  /* Pixel hearts */
  .hearts {
    display: flex;
    gap: 24px;
    margin-bottom: 40px;
  }
  .pixel-heart {
    width: 56px;
    height: 50px;
    position: relative;
  }
  .pixel-heart svg {
    width: 100%;
    height: 100%;
  }

  /* Big title */
  .title {
    font-size: 130px;
    color: #FF0050;
    line-height: 1.15;
    letter-spacing: 6px;
    margin-bottom: 60px;
    text-shadow: 4px 4px 0 rgba(255,45,120,0.2);
  }

  /* Subtitle */
  .subtitle {
    font-size: 26px;
    color: rgba(255,255,255,0.55);
    line-height: 2;
    margin-bottom: 50px;
    letter-spacing: 1px;
  }

  /* iMessage tag */
  .tag {
    font-size: 28px;
    color: #e8e44a;
    letter-spacing: 2px;
    margin-bottom: 80px;
  }
  .tag span {
    margin-right: 12px;
  }

  /* CTA text */
  .cta {
    font-size: 28px;
    color: #e8e44a;
    letter-spacing: 3px;
  }
  .cta span {
    margin-right: 14px;
  }

  /* Floating pixel dots */
  .pixel-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    z-index: 2;
  }
  .dot-yellow { background: #e8e44a; }
  .dot-pink { background: #FF0050; }
  .dot-cyan { background: #00c8ff; }

  /* Link sticker zone — place IG link sticker here */
  .link-zone {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    width: 100%;
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
  }

  .link-placeholder {
    width: 520px;
    height: 120px;
    border: 3px dashed rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }
  .link-url {
    font-size: 18px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 3px;
    margin-top: 8px;
  }


</style>
</head>
